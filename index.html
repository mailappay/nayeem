<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mailappay Digital Labs</title>
    <style>
        :root {
            --bg-dark: #081b29;
            --bg-panel: #11293e;
            --accent-blue: #7ab4d4;
            --text-main: #ffffff;
            --text-muted: #a0b8c9;
            --font-stack: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: var(--font-stack); }
        
        body { 
            background-color: var(--bg-dark); 
            color: var(--text-main); 
            line-height: 1.6; 
            overflow-x: hidden;
        }

        /* Dynamic Background */
        .bg-elements {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1;
            background: radial-gradient(circle at 15% 50%, rgba(17, 41, 62, 0.8), transparent 50%),
                        radial-gradient(circle at 85% 30%, rgba(122, 180, 212, 0.1), transparent 50%);
        }

        /* Header & Interactive Menu Button */
        header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 30px 5vw; position: fixed; width: 100%; top: 0; z-index: 100;
            background: rgba(8, 27, 41, 0.8); backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(122, 180, 212, 0.2);
        }

        .brand h1 { font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; }
        .brand span { color: var(--accent-blue); }

        .menu-btn {
            background: none; border: none; cursor: pointer;
            width: 35px; height: 25px; display: flex; flex-direction: column; justify-content: space-between;
            z-index: 1000;
        }
        
        .menu-btn span {
            display: block; width: 100%; height: 3px; background-color: var(--accent-blue);
            transition: all 0.3s ease;
        }

        /* Full-Screen Overlay Menu */
        .nav-overlay {
            position: fixed; top: 0; left: 0; width: 100vw; height: 100vh;
            background-color: rgba(8, 27, 41, 0.98);
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: all 0.5s ease; z-index: 900;
        }

        .nav-overlay.active { opacity: 1; visibility: visible; }
        
        .nav-overlay a {
            font-size: 2.5rem; color: var(--text-main); text-decoration: none;
            margin: 20px 0; text-transform: uppercase; letter-spacing: 3px;
            position: relative; transition: color 0.3s;
            transform: translateY(20px); opacity: 0;
        }

        .nav-overlay.active a { transform: translateY(0); opacity: 1; transition: all 0.5s ease 0.2s; }
        .nav-overlay.active a:nth-child(2) { transition-delay: 0.3s; }
        
        .nav-overlay a:hover { color: var(--accent-blue); }
        .nav-overlay a::after {
            content: ''; position: absolute; width: 0; height: 3px;
            bottom: -5px; left: 0; background-color: var(--accent-blue); transition: width 0.3s ease;
        }
        .nav-overlay a:hover::after { width: 100%; }

        /* Main Content Styling */
        main { padding: 150px 5vw 50px; min-height: 80vh; display: flex; align-items: center; }
        
        .hero-content { max-width: 800px; animation: slideUp 1s ease forwards; opacity: 0; transform: translateY(30px); }
        
        @keyframes slideUp { to { opacity: 1; transform: translateY(0); } }

        .hero-content h2 { font-size: 4rem; line-height: 1.1; margin-bottom: 20px; }
        .hero-content p { font-size: 1.2rem; color: var(--text-muted); margin-bottom: 40px; max-width: 600px; }
        
        .btn-primary {
            display: inline-block; padding: 15px 35px; border: 2px solid var(--accent-blue);
            color: var(--accent-blue); text-decoration: none; font-size: 1.1rem;
            text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s ease;
            background: transparent;
        }
        .btn-primary:hover { background: var(--accent-blue); color: var(--bg-dark); box-shadow: 0 0 20px rgba(122, 180, 212, 0.4); }

    </style>
</head>
<body>
    <div class="bg-elements"></div>

    <header>
        <div class="brand">
            <h1>Mailappay <span>Labs</span></h1>
        </div>
        <button class="menu-btn" onclick="toggleMenu()">
            <span></span><span></span><span></span>
        </button>
    </header>

    <div class="nav-overlay" id="navMenu">
        <a href="index.html">Main Interface</a>
        <a href="founder.html">Principal Architect</a>
        <a href="stories.html">Customer Stories</a>
    </div>

    <main>
        <div class="hero-content">
            <h3 style="color: var(--accent-blue); letter-spacing: 2px; margin-bottom: 10px;">THINK DIGITAL. THINK MAILAPPAY.</h3>
            <h2>Engineering Digital<br>Excellence.</h2>
            <p>We execute high-performance web development and scalable digital infrastructure tailored to your exact specifications.</p>
            <a href="stories.html" class="btn-primary">View Our Work</a>
        </div>
    </main>

    <script>
        // Interactive Menu Logic
        const menuBtn = document.querySelector('.menu-btn');
        const navMenu = document.getElementById('navMenu');
        let menuOpen = false;

        function toggleMenu() {
            if(!menuOpen) {
                navMenu.classList.add('active');
                menuBtn.children[0].style.transform = 'rotate(45deg) translate(8px, 8px)';
                menuBtn.children[1].style.opacity = '0';
                menuBtn.children[2].style.transform = 'rotate(-45deg) translate(7px, -8px)';
                menuOpen = true;
            } else {
                navMenu.classList.remove('active');
                menuBtn.children[0].style.transform = 'none';
                menuBtn.children[1].style.opacity = '1';
                menuBtn.children[2].style.transform = 'none';
                menuOpen = false;
            }
        }
    </script>
</body>
</html>
